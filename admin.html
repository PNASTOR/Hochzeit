<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hochzeitsgäste</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #333; color: white; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin-right: 10px; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>

<div class="card">
    <h2>Neuen Gast anlegen</h2>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="new-first-name" placeholder="Vorname">
        <input type="text" id="new-last-name" placeholder="Nachname">
    </div>
    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
        <input type="number" id="new-max-plus" placeholder="Max. Begleitpersonen" style="width: 180px;">
        <input type="text" id="new-admin-note" placeholder="Interne Notiz (optional)" style="flex-grow: 1;">
    </div>
    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
        <label style="cursor: pointer; font-size: 0.9em; color: #333; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="new-standesamt-check"> + Extra Standesamt-Einladung
        </label>
        <span id="standesamt-code-preview" style="font-family: monospace; color: #666; display: none;">Standesamt Code: ----</span>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span id="generated-code-preview" style="font-family: monospace; color: #666;">Vorschau Code: ----</span>
        <button id="add-code-btn">Gast in Datenbank speichern</button>
    </div>
</div>

<div class="card">
    <h2>Live Gästeliste</h2>
    <table id="admin-table" style="width: 100%; text-align: left;">
        <thead>
            <tr>
                <th>Code</th>
                <th>Hauptgast</th>
                <th>Status (Hochzeit)</th>
                <th>Standesamt</th>
                <th>Begleitungen</th>
                <th>Dinner Wünsche</th> <th>Notiz</th>
                <th>Aktionen</th>
            </tr>
        </thead>
        <tbody id="guest-list">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyACj7yHly0z2lPBzhgyXNTXx2GetvDhIds",
        authDomain: "hochz-6b842.firebaseapp.com",
        projectId: "hochz-6b842",
        storageBucket: "hochz-6b842.firebasestorage.app",
        messagingSenderId: "20011730032",
        appId: "1:20011730032:web:bf5eca12bdac484ceb20b5",
        measurementId: "G-YV13TJYV90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);



    //neu
    window.deleteGuest = async (code) => {
    if (confirm(`Möchtest du den Gast mit dem Code ${code} wirklich löschen?`)) {
        await deleteDoc(doc(db, "invitations", code));
    }
    };

    window.changeCode = async (oldCode) => {
    const newCode = prompt(`Gib den neuen 4-stelligen Code für Gast ${oldCode} ein:`);
    
    // Validierung
    if (!newCode || newCode.length !== 4) {
        alert("Der Code muss genau 4 Zeichen lang sein.");
        return;
    }
    if (newCode === oldCode) return;

    // 1. Prüfen, ob der neue Code bereits existiert (Duplikatsprüfung)
    const newDocRef = doc(db, "invitations", newCode);
    const newDocSnap = await getDoc(newDocRef);

    if (newDocSnap.exists()) {
        alert(`Fehler: Der Code ${newCode} ist bereits an einen anderen Gast vergeben!`);
        return;
    }

    // Daten vom alten Dokument holen
    const oldDocRef = doc(db, "invitations", oldCode);
    const oldDocSnap = await getDoc(oldDocRef);
    const data = oldDocSnap.data();

    // Neues Dokument mit altem Inhalt erstellen & altes löschen
    try {
        await setDoc(newDocRef, data);
        await deleteDoc(oldDocRef);
        alert(`Code erfolgreich von ${oldCode} auf ${newCode} geändert.`);
    } catch (error) {
        console.error("Fehler beim Verschieben:", error);
        alert("Ein Fehler ist aufgetreten.");
    }
};

  window.editNote = async (code) => {
    const docRef = doc(db, "invitations", code);
    const docSnap = await getDoc(docRef);
    const oldNote = docSnap.data().adminNote || "";
    
    const newNote = prompt("Notiz bearbeiten:", oldNote);
    if (newNote !== null) {
        await updateDoc(docRef, { adminNote: newNote });
    }
    };

    // Live-Update der Tabelle
    const q = collection(db, "invitations");
    // --- TABELLEN UPDATE (onSnapshot) ---
// --- TABELLEN UPDATE (onSnapshot) ---
onSnapshot(collection(db, "invitations"), (snapshot) => {
    const tbody = document.getElementById('guest-list');
    tbody.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const guests = data.guests || [];
        const hasGuests = guests.length > 0;
        const note = data.adminNote || ""; 
        
        // Standesamt-Daten auslesen
        const hasStandesamt = data.hasStandesamt || false;
        const sCode = data.standesamtCode || "-";
        let sStatus = data.standesamtStatus || "pending";
        if(sStatus === "attending") sStatus = "✅ Zugesagt";
        else if(sStatus === "declined") sStatus = "❌ Abgesagt";
        else sStatus = "⏳ Ausstehend";

        let standesamtHtml = "-";
        if (hasStandesamt) standesamtHtml = `<b>${sCode}</b><br><span style="font-size:0.8em; color:#666;">${sStatus}</span>`;

        // Dinner Daten auslesen und formatieren
        const dinnerPrefs = data.dinnerPreferences || [];
        let dinnerHtml = "Keine Eingabe";
        
        if (dinnerPrefs.length > 0) {
            const hasAnyInfo = dinnerPrefs.some(d => d.allergies !== "" || d.notes !== "");
            if (hasAnyInfo) {
                let listItems = dinnerPrefs.map(d => {
                    let info = [];
                    if (d.allergies) info.push(`<b>Allergien:</b> ${d.allergies}`);
                    if (d.notes) info.push(`<b>Info:</b> ${d.notes}`);
                    
                    if (info.length === 0) return ""; 
                    return `<li style="margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px;"><b>${d.name}</b><br>${info.join('<br>')}</li>`;
                }).join('');

                dinnerHtml = `
                    <details>
                        <summary style="cursor: pointer; color: #b28b5e; font-weight: bold;">Anzeigen</summary>
                        <ul style="text-align:left; font-size: 0.85em; list-style-type: none; padding-left: 0; margin-top: 5px;">
                            ${listItems}
                        </ul>
                    </details>
                `;
            } else {
                dinnerHtml = "<span style='color: #28a745;'>Keine Besonderheiten</span>";
            }
        }

        // --- NEU: MUSIKWÜNSCHE AUSLESEN ---
        const songs = data.songWishlist || [];
        let songsHtml = "-";
        if (songs.length > 0) {
            songsHtml = `
                <details>
                    <summary style="cursor: pointer; color: #b28b5e; font-weight: bold;">${songs.length} Lied(er)</summary>
                    <ul style="text-align:left; font-size: 0.85em; padding-left: 15px; margin-top: 5px;">
                        ${songs.map(s => `<li><b>${s.title}</b><br><span style="color:#666;">${s.artist}</span></li>`).join('')}
                    </ul>
                </details>
            `;
        }
        // ----------------------------------

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${docSnap.id}</b></td>
            <td>${data.name}</td>
            <td>${data.status === "attending" ? "✅" : (data.status === "declined" ? "❌" : "⏳")} ${data.status}</td>
            <td>${standesamtHtml}</td>
            <td>
                ${hasGuests ? `
                    <details>
                        <summary>${guests.length} Begleitung(en)</summary>
                        <ul style="text-align:left; font-size: 0.9em; padding-left: 15px; margin-top: 5px;">
                            ${guests.map(g => `<li>${g.firstName} ${g.lastName}</li>`).join('')}
                        </ul>
                    </details>
                ` : "Keine"}
            </td>
            
            <td style="min-width: 120px;">${dinnerHtml}</td>
            
            <td style="min-width: 120px;">${songsHtml}</td>
            
            <td style="max-width: 150px; font-size: 0.85em; color: #555; cursor: pointer;" onclick="window.editNote('${docSnap.id}')">
                ${note ? note : "<i>Klicken zum Hinzufügen</i>"}
            </td>
            <td>
                <button onclick="window.changeCode('${docSnap.id}')" class="btn-warning">Code</button>
                <button onclick="window.deleteGuest('${docSnap.id}')" class="btn-danger">Löschen</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
});

let currentSalt = Math.random().toString(36).substring(2, 8); 
let currentStandesamtSalt = Math.random().toString(36).substring(2, 8); // NEU: Zweiter Salt für Standesamt

function generateHashCode(fName, lName, salt) {
    const str = (fName + lName).toLowerCase().trim() + salt;
    let hash = 5381;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) + hash) + str.charCodeAt(i);
    }
    const result = (Math.abs(hash) % 9998) + 1;
    return result.toString().padStart(4, '0');
}

// Live-Vorschau aktualisieren (jetzt für beide Codes)
const updatePreview = () => {
    const fn = document.getElementById('new-first-name').value;
    const ln = document.getElementById('new-last-name').value;
    
    document.getElementById('generated-code-preview').innerText = "Code Hochzeit: " + generateHashCode(fn, ln, currentSalt);
    
    // Standesamt Preview ein/ausblenden
    if (document.getElementById('new-standesamt-check').checked) {
        document.getElementById('standesamt-code-preview').style.display = "inline";
        document.getElementById('standesamt-code-preview').innerText = "Standesamt: " + generateHashCode(fn, ln, currentStandesamtSalt);
    } else {
        document.getElementById('standesamt-code-preview').style.display = "none";
    }
};

document.getElementById('new-first-name').addEventListener('input', updatePreview);
document.getElementById('new-last-name').addEventListener('input', updatePreview);
document.getElementById('new-standesamt-check').addEventListener('change', updatePreview); // NEU
updatePreview(); 

// --- GAST SPEICHERN ---
document.getElementById('add-code-btn').addEventListener('click', async () => {
    const fName = document.getElementById('new-first-name').value.trim();
    const lName = document.getElementById('new-last-name').value.trim();
    const note = document.getElementById('new-admin-note').value.trim();
    const allowed = parseInt(document.getElementById('new-max-plus').value) || 0;
    const hasStandesamt = document.getElementById('new-standesamt-check').checked; // NEU

    let code = generateHashCode(fName, lName, currentSalt);

    let docSnap = await getDoc(doc(db, "invitations", code));
    while(docSnap.exists()) {
        currentSalt = Math.random().toString(36).substring(2, 8);
        code = generateHashCode(fName, lName, currentSalt);
        docSnap = await getDoc(doc(db, "invitations", code));
    }

    // NEU: Standesamt Code generieren und prüfen
    let sCode = "";
    if (hasStandesamt) {
        sCode = generateHashCode(fName, lName, currentStandesamtSalt);
        let q = query(collection(db, "invitations"), where("standesamtCode", "==", sCode));
        let querySnapshot = await getDocs(q);
        
        // Verhindern, dass der Standesamt-Code schon existiert ODER gleich dem Hochzeits-Code ist
        while(!querySnapshot.empty || sCode === code) { 
            currentStandesamtSalt = Math.random().toString(36).substring(2, 8);
            sCode = generateHashCode(fName, lName, currentStandesamtSalt);
            q = query(collection(db, "invitations"), where("standesamtCode", "==", sCode));
            querySnapshot = await getDocs(q);
        }
    }

    let fullName = (fName + " " + lName).trim();
    if (fullName === "") fullName = "Unbekannter Gast";

    await setDoc(doc(db, "invitations", code), {
        name: fullName,
        firstName: fName,
        lastName: lName,
        status: "pending",
        allowedPlusOnes: allowed,
        adminNote: note,
        hasStandesamt: hasStandesamt,          // NEU
        standesamtCode: sCode,                 // NEU
        standesamtStatus: hasStandesamt ? "pending" : null, // NEU
        guests: [] 
    });

    // Reset der Felder
    document.getElementById('new-first-name').value = "";
    document.getElementById('new-last-name').value = "";
    document.getElementById('new-max-plus').value = "";
    document.getElementById('new-admin-note').value = "";
    document.getElementById('new-standesamt-check').checked = false;
    currentSalt = Math.random().toString(36).substring(2, 8);
    currentStandesamtSalt = Math.random().toString(36).substring(2, 8);
    updatePreview();
});
</script>
</body>
</html>
