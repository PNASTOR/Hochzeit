<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsere Hochzeit - RSVP</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f9f6f0; 
            margin: 0;
            padding: 0;
            min-height: 100svh; /* svh beachtet auch die Adressleiste bei mobilen Browsern */
            display: flex;
            flex-direction: column;
            align-items: center; 
        }
        
        /* --- WRAPPER FÜR DIE STARTSEITE (Genau 1 Bildschirmhöhe) --- */
        #landing-page-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Verteilt alles gleichmäßig vertikal */
            align-items: center;
            width: 100%;
            max-width: 500px;
            height: 100svh; /* Nimmt exakt die sichtbare Bildschirmhöhe ein */
            padding: 3vh 20px 4vh 20px; /* Dynamischer Abstand (vh) oben und unten */
            box-sizing: border-box;
        }

        .container { 
            background: white; 
            padding: 3vh 20px; /* vh = schrumpft auf kleinen Handys etwas zusammen */
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%;
            box-sizing: border-box;
        }

        /* Der Formular-Bereich darf scrollen, falls er sehr lang wird */
        #rsvp-section, #success-section {
            max-width: 500px;
            margin-top: 5vh;
            margin-bottom: 5vh;
        }
        
        /* QR Code Styling - Skaliert jetzt mit der Bildschirmhöhe! */
        .qr-image {
            width: auto;
            max-width: 100%; 
            max-height: 22vh; /* Das Bild nimmt maximal 22% der Bildschirmhöhe ein */
            margin: 0 auto 2vh auto;
            display: block;
            border-radius: 10px;
        }

        h2 { margin: 1vh 0; font-size: 1.6em; }
        p { margin: 1vh 0; }

        /* 4-PIN Eingabe Styling */
        .pin-container {
            display: flex;
            justify-content: center;
            gap: 15px; 
            margin: 2vh 0 3vh 0;
        }
        .pin-input {
            width: 50px;
            height: 55px;
            font-size: 28px;
            text-align: center;
            border: none;
            border-bottom: 3px solid #b28b5e; 
            background: transparent;
            outline: none;
            border-radius: 0;
            padding: 0;
        }
        .pin-input:focus { border-bottom-color: #333; }

        /* Formular Styling */
        input:not(.pin-input), select, textarea { 
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; 
        }
        button { 
            background-color: #333; 
            color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 18px; 
        }
        button:hover { background-color: #555; }
        .hidden { display: none !important; }
        .error-text { color: #dc3545; margin-top: 10px; }


        /* --- SCHRIFTZUG ANIMATION --- */
        .signature-wrapper {
            margin: auto; /* Zieht sich automatisch in die Mitte des freien Platzes */
            max-width: 280px; 
            width: 100%;
        }
        
        .signature-img {
            width: 100%;
            height: auto;
            max-height: 12vh; /* Wird auf kleinen Displays nicht zu riesig */
            object-fit: contain;
            display: block;
            clip-path: inset(0 100% 0 0);
            animation: writeSignature 2s ease-in-out 0.5s forwards;
        }

        @keyframes writeSignature {
            to { clip-path: inset(0 0 0 0); }
        }


        /* --- DATUM ANIMATION STYLING --- */
        .wedding-date-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0; /* Wird vom Wrapper (space-between) gesteuert */
            color: #000;
        }

        .date-divider {
            width: 2px;
            height: 55px;
            background-color: #000;
            transform: scaleY(0);
            animation: growLine 1s ease-out 2.5s forwards;
            z-index: 10;
        }

        .date-mask {
            overflow: hidden; 
            padding: 0 15px;
        }

        .date-left {
            text-align: right;
            transform: translateX(120%); 
            animation: slideOut 1s cubic-bezier(0.2, 0.8, 0.2, 1) 3s forwards;
        }

        .date-right {
            text-align: left;
            transform: translateX(-120%); 
            animation: slideOut 1s cubic-bezier(0.2, 0.8, 0.2, 1) 3s forwards;
        }

        .date-left p, .date-right p { margin: 0; line-height: 1.2; }
        .txt-bold { font-weight: 800; font-size: 20px; letter-spacing: 1px; }
        .txt-light { font-weight: 300; font-size: 12px; letter-spacing: 3px; }

        @keyframes growLine { to { transform: scaleY(1); } }
        @keyframes slideOut { to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="landing-page-wrapper">
    
    <div class="container" id="login-section">
        <img src="QRCode.png" alt="QR Code" class="qr-image">
        
        <h2>Willkommen!</h2>
        <p>Bitte gib deinen 4-stelligen Code ein:</p>
        
        <div class="pin-container">
            <input type="text" class="pin-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
        </div>

        <button id="login-btn">RSVP Senden</button>
        <p id="login-error" class="hidden error-text"></p>
    </div>

    <div class="signature-wrapper">
        <img src="signature.png" alt="Raisa & Avid" class="signature-img">
    </div>

    <div class="wedding-date-wrapper">
        <div class="date-mask">
            <div class="date-left">
                <p class="txt-bold">08</p>
                <p class="txt-light">SATURDAY</p>
            </div>
        </div>
        <div class="date-divider"></div>
        <div class="date-mask">
            <div class="date-right">
                <p class="txt-light">AUGUST</p>
                <p class="txt-bold">2026</p>
            </div>
        </div>
    </div>
    
</div>

<div class="container hidden" id="rsvp-section">
    <h2>Schön, dass du da bist!</h2>
    <form id="rsvp-form">
        <label>Bist du dabei?</label>
        <select id="status" required>
            <option value="" disabled selected>Bitte wählen...</option>
            <option value="attending">Ja, ich komme gerne!</option>
            <option value="declined">Nein, ich kann leider nicht.</option>
        </select>

        <label>Dein Vor- und Nachname:</label>
        <input type="text" id="guest-name" required placeholder="Max Mustermann">

        <label>Namen deiner Begleitung(en) (falls vorhanden):</label>
        <input type="text" id="plus-ones" placeholder="Lisa Mustermann, ...">

        <label>Allergien oder Ernährungsbesonderheiten:</label>
        <textarea id="allergies" rows="3" placeholder="z.B. Vegan, Erdnussallergie..."></textarea>

        <button type="submit">Antwort speichern</button>
    </form>
</div>

<div class="container hidden" id="success-section">
    <h2>Vielen Dank!</h2>
    <p>Wir haben deine Antwort erfolgreich gespeichert.</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // DEINE FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyACj7yHly0z2lPBzhgyXNTXx2GetvDhIds",
        authDomain: "hochz-6b842.firebaseapp.com",
        projectId: "hochz-6b842",
        storageBucket: "hochz-6b842.firebasestorage.app",
        messagingSenderId: "20011730032",
        appId: "1:20011730032:web:bf5eca12bdac484ceb20b5",
        measurementId: "G-YV13TJYV90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentCode = "";

    // --- LOGIK FÜR DIE 4 PIN FELDER ---
    const pinInputs = document.querySelectorAll('.pin-input');
    
    pinInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < pinInputs.length - 1) {
                pinInputs[index + 1].focus();
            }
        });
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                pinInputs[index - 1].focus();
            }
        });
    });

    // --- LOGIN LOGIK ---
    document.getElementById('login-btn').addEventListener('click', async () => {
        const codeArray = Array.from(pinInputs).map(input => input.value);
        const code = codeArray.join('');

        if(code.length !== 4) {
            document.getElementById('login-error').innerText = "Bitte gib alle 4 Ziffern ein.";
            document.getElementById('login-error').classList.remove('hidden');
            return;
        }

        const docRef = doc(db, "invitations", code);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            currentCode = code;
            
            // HIER WIRD NUN ALLES AUSGEBLENDET
            document.getElementById('landing-page-wrapper').classList.add('hidden');
            document.getElementById('rsvp-section').classList.remove('hidden');
            
            const data = docSnap.data();
            if(data.status !== "pending") document.getElementById('status').value = data.status;
            if(data.name) document.getElementById('guest-name').value = data.name;
            if(data.plusOnes) document.getElementById('plus-ones').value = data.plusOnes;
            if(data.allergies) document.getElementById('allergies').value = data.allergies;
        } else {
            document.getElementById('login-error').innerText = "Code ungültig. Bitte versuche es erneut.";
            document.getElementById('login-error').classList.remove('hidden');
            pinInputs.forEach(input => input.value = '');
            pinInputs[0].focus();
        }
    });

    // --- FORMULAR ABSENDEN LOGIK ---
    document.getElementById('rsvp-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const docRef = doc(db, "invitations", currentCode);
        await updateDoc(docRef, {
            status: document.getElementById('status').value,
            name: document.getElementById('guest-name').value,
            plusOnes: document.getElementById('plus-ones').value,
            allergies: document.getElementById('allergies').value,
            lastUpdated: new Date()
        });

        document.getElementById('rsvp-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
    });
</script>
</body>
</html>
